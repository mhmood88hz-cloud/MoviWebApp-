{% extends "base.html" %}
{% block content %}
    <a href="{{ url_for('index') }}" style="text-decoration: none; color: #3182ce; font-weight: bold;">← Back to Users</a>
    <h1>Movies for {{ user.name }}</h1>
    <div class="card-grid">
        {% for movie in movies %}
            <div class="card" style="text-align: center;">
                <img src="{{ movie.poster_url }}" alt="Poster" style="width: 100%; height: 280px; object-fit: cover; border-radius: 5px;">
                <h3 style="margin: 15px 0 5px 0; font-size: 18px;">{{ movie.title }}</h3>
                <p style="margin: 0; color: #718096; font-size: 14px;"><strong>Year:</strong> {{ movie.year }}</p>
                <p style="margin: 0 0 15px 0; color: #718096; font-size: 14px;"><strong>Director:</strong> {{ movie.director }}</p>
                <form action="{{ url_for('update_user_movie', user_id=user.id, movie_id=movie.id) }}" method="post" style="margin-bottom: 10px;">
                    <input type="text" name="new_title" placeholder="New title..." required style="padding: 5px; width: 65%;">
                    <button type="submit" class="btn" style="padding: 5px 10px; font-size: 12px;">Update</button>
                </form>
                <form action="{{ url_for('delete_user_movie', user_id=user.id, movie_id=movie.id) }}" method="post">
                    <button type="submit" class="btn btn-danger" style="padding: 6px 12px; font-size: 13px; width: 100%;">Delete</button>
                </form>
            </div>
        {% endfor %}
    </div>
    <div class="form-box">
        <h3>Add New Movie</h3>
        <form action="{{ url_for('add_movie_to_user', user_id=user.id) }}" method="post" class="form-group">
            <input type="text" name="movie_title" placeholder="Movie title" required>
            <button type="submit" class="btn">Add Movie</button>
        </form>
    </div>
{% endblock %}
